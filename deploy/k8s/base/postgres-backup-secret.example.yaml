# TEMPLATE ONLY — intentionally NOT referenced by kustomization.yaml.
#
# The real `polytrader-minio-backup` Secret is created out-of-band so that `make k8s-deploy`
# (kubectl apply -k) never re-applies it and clobbers the live creds back to a placeholder. Both the
# CNPG WAL archiver (postgres/cluster.yaml) and the retention CronJob (postgres-backup.yaml) read it.
#
# CREATE / ROTATE IT WITH:   make k8s-set-backup-creds
#   (pulls RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY from the running `daytrader_rustfs` container — the
#    shared S3-compatible RustFS on the host at http://host.docker.internal:9000 — and applies the
#    Secret without printing the values.)
#
# The bucket must also exist once: s3://polytrader-cnpg (create via boto3/aws against the same endpoint).
#
# VERIFY:  kubectl get cluster polytrader-postgres -n polytrader \
#            -o jsonpath='{.status.conditions[?(@.type=="ContinuousArchiving")].status}'   → "True"
#
# Shape (do not commit real values):
apiVersion: v1
kind: Secret
metadata:
  name: polytrader-minio-backup
  namespace: polytrader
type: Opaque
stringData:
  ACCESS_KEY_ID: "<rustfs-access-key>"
  ACCESS_SECRET_KEY: "<rustfs-secret-key>"
