# Hermes self-improvement / reflection agent deployment.
# Separate from main trader for independent lifecycle and safety.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # Wait for Postgres before starting (critical for CNPG)
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h polytrader-postgres-rw.polytrader.svc.cluster.local -p 5432 -U polytrader; do
                echo "Waiting for Postgres..."
                sleep 3
              done
              echo "Postgres ready for Hermes."
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault

      containers:
        - name: hermes
          image: hermes:local
          imagePullPolicy: IfNotPresent
          # Explicit command ensures tini + binary regardless of stale image ENTRYPOINT/CMD metadata.
          # Combined with Makefile timestamp tagging + kubectl set-image on every deploy, this
          # guarantees the fresh long-lived binary from src/bin/hermes.rs is always used.
          command:
            - /usr/bin/tini
            - --
            - /app/hermes
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: polytrader-postgres-app
                  key: uri
            - name: RUST_LOG
              value: "info,hermes=debug"
            # Closed-loop FusionEngine weight tuning: when 'on', Hermes writes strategy_weights events
            # that the app loads to adjust per-processor weights. Paper-only; clamped + gradual.
            - name: HERMES_AUTONOMOUS_WEIGHT_TUNING
              value: "on"
            # Learning-phase guard: hold weights neutral until at least this many positions have
            # SETTLED (realized P&L exists), so tuning is driven by ground truth not fire-rate noise.
            - name: HERMES_MIN_SETTLED_FOR_TUNING
              value: "10"
            # LLM synthesis via OpenRouter (OpenAI-compatible). Health journaled as llm_health events
            # (status/cause) so the dashboards surface failures (out of credits, auth, rate-limit).
            - name: LLM_API_ENDPOINT
              value: "https://openrouter.ai/api/v1/chat/completions"
            - name: LLM_MODEL
              value: "openai/gpt-5.4-mini"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: polytrader-openrouter
                  key: OPENROUTER_API_KEY
            # Phase 2: set HERMES_AUTONOMOUS_WIKI_PROPOSALS=lowrisk (via secret or env override) to enable
            # the gated autonomous low-risk wiki proposal behavior (see src/bin/hermes.rs). Default off for safety.
            # No manifest change required; opt-in per AGENTS "human review for high-impact" + smallest viable.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          # The hermes binary runs the richer Phase 1 reflection loop (see src/bin/hermes.rs: real P&L/Decimal attribution,
          # conditional LLM via reqwest, journal.reflections storage, wiki proposals). Long-lived per design.
