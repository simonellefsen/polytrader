# Main polytrader deployment (Rust/Dioxus binary + background loops)
# Paper mode only until Phase 3.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: polytrader
  labels:
    app: polytrader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polytrader
  template:
    metadata:
      labels:
        app: polytrader
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: polytrader
          image: polytrader:local   # overridden at deploy time via unique TS tag + explicit set-image (rust_daytrader pattern)
          imagePullPolicy: IfNotPresent
          # Hardened scratch image: direct binary is PID1. Our shutdown_signal() + tokio::signal
          # handles SIGTERM/SIGINT for graceful axum shutdown (no tini needed).
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POLYTRADER_MODE
              value: "paper"
            # Bootstrap market slugs across Geopolitics / Breaking / Finance + Sports (World Cup).
            # Sports are arbitrage-only (see POLYTRADER_ARB_ONLY_MARKETS). Uncertain Finance/Tech
            # markets are scarce on Polymarket right now, so the directional set is geopolitics-heavy.
            # 2026-07-04: pruned 26 resolved/eliminated slugs (all June/July/Aug/Dec Iran-Hormuz
            # deadline variants — resolved early with the June deal — plus NBA finals and eliminated
            # WC teams). They only produced closed=true fallback churn each ingest tick.
            - name: POLYTRADER_BOOTSTRAP_MARKETS
              value: "strait-of-hormuz-traffic-returns-to-normal-by-end-of-june,strait-of-hormuz-traffic-returns-to-normal-by-july-31,will-benjamin-netanyahu-be-the-next-prime-minister-of-israel,will-gavin-newsom-win-the-2028-democratic-presidential-nomination-568,will-jd-vance-win-the-2028-us-presidential-election,will-jd-vance-win-the-2028-republican-presidential-nomination,will-marco-rubio-win-the-2028-republican-presidential-nomination,will-the-republicans-win-the-2028-us-presidential-election,will-the-democrats-win-the-2028-us-presidential-election,will-the-republican-party-control-the-house-after-the-2026-midterm-elections,will-the-democratic-party-control-the-senate-after-the-2026-midterm-elections,2026-balance-of-power-d-senate-d-house-949,will-luiz-incio-lula-da-silva-win-the-2026-brazilian-presidential-election,will-flvio-bolsonaro-win-the-2026-brazilian-presidential-election,will-jordan-bardella-win-the-2027-french-presidential-election,will-douard-philippe-win-the-2027-french-presidential-election,will-gadi-eizenkot-be-the-next-prime-minister-of-israel,will-china-invade-taiwan-by-december-31-2027,will-no-fed-rate-cuts-happen-in-2026,fed-rate-hike-in-2026,will-bitcoin-reach-90000-by-december-31-2026-113-862-581-343,will-ethereum-dip-to-800-by-december-31-2026-568,will-france-win-the-2026-fifa-world-cup-924,will-spain-win-the-2026-fifa-world-cup-963,will-usa-win-the-2026-fifa-world-cup-467,will-england-win-the-2026-fifa-world-cup-937,will-argentina-win-the-2026-fifa-world-cup-245,will-portugal-win-the-2026-fifa-world-cup-912,will-brazil-win-the-2026-fifa-world-cup-183"
            # Arb-only markets (sports/World Cup): directional executor skips these; only risk-free
            # YES+NO arbitrage may trade them.
            - name: POLYTRADER_ARB_ONLY_MARKETS
              value: "will-france-win-the-2026-fifa-world-cup-924,will-spain-win-the-2026-fifa-world-cup-963,will-usa-win-the-2026-fifa-world-cup-467,will-england-win-the-2026-fifa-world-cup-937,will-argentina-win-the-2026-fifa-world-cup-245,will-portugal-win-the-2026-fifa-world-cup-912,will-brazil-win-the-2026-fifa-world-cup-183"
            # Autonomous paper executor: when "on", passing Decision Reports go through RiskManager
            # gates and place Kelly-sized PAPER orders (never real). Default off = evaluation only.
            - name: POLYTRADER_AUTONOMOUS_PAPER_EXECUTION
              value: "on"
            # Arb-discovery universe: on each ingest tick, ALSO pull the top-N active binary order-book
            # markets by 24h volume (deduped with the bootstrap slugs + any market we hold). Breadth is
            # the arb frequency lever — dislocations are rare per-market but scale with books watched.
            # ~1s of book-fetching per market/tick, so keep N well under ingest_interval (300s): 150 ⇒
            # ~180s tick. 0 disables (bootstrap-only). Directional exec is unaffected (arb-only routing).
            - name: POLYTRADER_ARB_DISCOVERY_LIMIT
              value: "150"
            # Directional market rotation (6h cadence): promote up to LIMIT active, order-book,
            # binary, NON-sports markets ending within MAX_DAYS and above the 24h-volume floor into
            # market_data.directional_universe; demote on close/resolution. The directional executor
            # trades ONLY (bootstrap slugs ∪ active rotation rows) — everything else stays arb-only.
            # This keeps the tradeable set short-dated and fresh (the profile the June 2026 curated
            # set proved out) instead of decaying as hand-picked markets resolve. 0 disables.
            - name: POLYTRADER_ROTATION_LIMIT
              value: "20"
            - name: POLYTRADER_ROTATION_MAX_DAYS
              value: "30"
            - name: POLYTRADER_ROTATION_MIN_VOL24H
              value: "5000"
            # Autonomous exits (paper-only, 5-min cadence): close positions at market on
            # take-profit / stop-loss / time-stop / signal-flip instead of holding to resolution.
            # Turns slow markets into bounded round-trips so Hermes gets realized win/loss feedback
            # in days, not months. Settlement still owns resolved/closed markets.
            - name: POLYTRADER_AUTONOMOUS_EXITS
              value: "on"
            - name: POLYTRADER_EXIT_TAKE_PROFIT_PCT
              value: "0.25"
            # WIDENED 0.15 → 0.50 on 2026-07-09: P&L decomposition showed 100% of post-reset losses
            # came from exits (stop-loss ~−$69) while every held-to-resolution position won (3/3,
            # +$4.44). Prediction-market positions are bounded (max loss = entry cost, no blowup
            # tail) and mean-revert, so a tight stop sells noise and pays friction for it. At 0.50
            # the stop fires only on a genuine thesis-collapse; ordinary wobble rides to resolution
            # or the time-stop. See wiki/roadmap "stop-loss widened".
            - name: POLYTRADER_EXIT_STOP_LOSS_PCT
              value: "0.50"
            - name: POLYTRADER_EXIT_MAX_HOLD_DAYS
              value: "14"
            # Anti-churn (2026-07-06, after −$54 of overnight stop-loss churn): a stop only fires
            # when the mid ALSO moved this much in absolute price (relative −15% on cheap shares is
            # bid/ask noise), and after any autonomous exit the market is blocked from directional
            # re-entry for the cooldown (stop→rebuy and signal-flip Yes⇄No oscillation both paid
            # spread+fees every round trip).
            - name: POLYTRADER_EXIT_MIN_ABS_MOVE
              value: "0.04"
            - name: POLYTRADER_REENTRY_COOLDOWN_HOURS
              value: "24"
            # Both-sides target selection: when "on", the 5-min DR generator evaluates BOTH outcomes
            # and targets whichever has the higher net edge after fees (instead of always the cheaper
            # side). Lets the book buy a favorite when signals support it — unlocks theta's converging-
            # favorite case + the calibration finding (high-conviction bets underpriced). Paper-only;
            # net-edge gate + Kelly still govern. Default off = cheaper-side only.
            - name: POLYTRADER_DR_EVAL_BOTH_SIDES
              value: "on"
            # Risk gate tuning (paper-only; surfaced read-only in the /trades Parameters panel).
            # MIN_NET_EDGE is the LIVE gate (2%); SHADOW_NET_EDGE (4%) is recorded-not-enforced so the
            # /trades Gate Simulation can compare how a stricter gate would have done on the same run.
            - name: POLYTRADER_MIN_NET_EDGE
              value: "0.02"
            - name: POLYTRADER_SHADOW_NET_EDGE
              value: "0.04"
            # Correlated-cluster exposure cap: max fraction of the book locked across all markets that
            # resolve off the same underlying event (e.g. the ~15 Iran/Hormuz peace-deal markets). Each
            # passes the 20% per-market cap individually, but together they are one giant correlated bet.
            - name: POLYTRADER_MAX_CLUSTER_EXPOSURE_PCT
              value: "0.35"
            # External advisory signals: Yahoo Finance spot (asset markets) + newsdata.io news
            # headline sentiment, fed into FusionEngine as low-confidence advisory inputs.
            - name: POLYTRADER_EXTERNAL_SIGNALS
              value: "on"
            # newsdata.io API key (free plan, 200 credits/day — usage is cached + budget-capped).
            - name: NEWSDATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: polytrader-newsdata
                  key: NEWSDATA_API_KEY
            # READ-ONLY real CLOB access: lets the fail-closed shadow pipeline validate would-be
            # orders against real account/market state (balance, allowance, tick size). No writes.
            # Real ORDER submission stays gated separately (ENABLE_REAL_ORDER_SUBMISSION, unset).
            - name: POLYTRADER_ENABLE_REAL_CLOB_READS
              value: "true"
            # Real Polymarket account (read-only reconciliation): proxy/funder wallet that holds the
            # PUSD collateral, and the signer's proxy type. signature_type=1 (POLY_PROXY) confirmed
            # on-chain (proxy is a Polymarket ProxyWallet, not a Gnosis Safe). No order path enabled.
            - name: POLYMARKET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: polytrader-polymarket
                  key: POLYMARKET_ADDRESS
            - name: POLYMARKET_SIGNATURE_TYPE
              value: "1"
            - name: RUST_LOG
              value: "info,polytrader=debug"
            # Extra visibility for container debugging
            - name: RUST_BACKTRACE
              value: "1"
            # DATABASE_URL can be provided directly or via mounted secret file (best practice)
            - name: DATABASE_URL_FILE
              value: /etc/secrets/postgres-app/uri
            # Subpath when exposed via the shared ngrok tunnel
            - name: SUBPATH_PREFIX
              value: "/polytrader"
            # New auth config (from 2026-05-25 auth flow). Empty = disabled (paper mode safe).
            - name: GOOGLE_CLIENT_ID
              value: ""
            - name: GOOGLE_CLIENT_SECRET
              value: ""
            - name: GOOGLE_REDIRECT_URI
              value: ""
            - name: ALLOWED_EMAILS
              value: ""
            - name: AUTH_COOKIE_SECURE
              value: "false"
            # L2 auth private key (injected via secret file for security)
            - name: POLYMARKET_PRIVATE_KEY_FILE
              value: /etc/secrets/l2-auth/private-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          # Readiness/Liveness probes for the axum HTTP server (Phase 0 dashboard).
          # Uses the existing /health endpoint (returns 200 + JSON {"status":"ok"}).
          # POC values: conservative enough for docker-desktop / low traffic; adjust in overlays for prod.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 12   # give auth config + static init a bit more time on fresh pods
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-app-secret
              mountPath: /etc/secrets/postgres-app
              readOnly: true
            - name: l2-auth-secret
              mountPath: /etc/secrets/l2-auth
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: postgres-app-secret
          secret:
            secretName: polytrader-postgres-app
            items:
              - key: uri
                path: uri
        - name: l2-auth-secret
          secret:
            secretName: polytrader-l2-auth
            optional: true
            items:
              - key: private-key
                path: private-key
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: polytrader
  labels:
    app: polytrader
spec:
  selector:
    app: polytrader
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
